<!DOCTYPE html>
<html>
    <head>
        <title>weather website</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width" initial-scale="1.0">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="card">
            <div class="search">
                <input type="text" class="cityInput" placeholder="enter your city">
                <button class="btn"><img src="/images/search.png"></button>      
            </div>
            <div class="weather">
                <img src="images/rain.png" class="weather-icon">
                <h1 class="temp">22</h1>
                <h2 class="city-name">New York</h2>
                <div class="details">
                    <div class="col">
                        <img src="images/humidity.png">
                        <p class="humidity">22</p>
                        <p>humidity</p>
                    </div>
                     <div class="col">
                        <img src="images/wind.png">
                        <p class="wind">10 km/h</p>
                        <p>wind speed</p>
                    </div>
                </div>
               

            </div>
        </div>
        
        <script src="script.js"></script>
    </body>
</html>
